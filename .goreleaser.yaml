project_name: mcp-wrangler

builds:
  - id: linux-amd64
    main: ./cmd/mcp-wrangler
    binary: mcp-wrangler
    env:
      - CGO_ENABLED=1
      - CC=gcc
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w

  - id: linux-arm64
    main: ./cmd/mcp-wrangler
    binary: mcp-wrangler
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Co-Authored-By"

release:
  github:
    owner: JeremiahChurch
    name: mcp-wrangler
  draft: false
  prerelease: auto
