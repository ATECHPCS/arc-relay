# WARNING: The default values below are for LOCAL DEVELOPMENT ONLY.
# Copy .env.example to .env and change the encryption key, session secret,
# and admin password before deploying to any shared or production environment.
services:
  arc-relay:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - ARC_RELAY_ENCRYPTION_KEY=${ARC_RELAY_ENCRYPTION_KEY:-changeme}
      - ARC_RELAY_SESSION_SECRET=${ARC_RELAY_SESSION_SECRET:-changeme}
      - ARC_RELAY_ADMIN_PASSWORD=${ARC_RELAY_ADMIN_PASSWORD:-changeme}
      - ARC_RELAY_DB_PATH=${ARC_RELAY_DB_PATH:-/data/arc-relay.db}

volumes:
  relay-data:
