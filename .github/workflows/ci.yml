name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install SQLite dev headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/mcp-wrangler

      - name: Test
        run: CGO_ENABLED=1 go test ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install SQLite dev headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: CGO_ENABLED=1 gosec -exclude=G104,G706 ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (advisory)
        run: CGO_ENABLED=1 govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (see above)"
