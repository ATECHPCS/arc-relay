[server]
host = "0.0.0.0"
port = 8080

[database]
path = "/data/arc-relay.db"

[docker]
# Docker socket path (default for Linux)
socket = "unix:///var/run/docker.sock"
# Network for managed containers
network = "arc-relay"

[encryption]
# Key for encrypting stored credentials (generate with: openssl rand -hex 32)
key = "change-me-generate-a-real-key"

[auth]
# Session secret for web UI cookies
session_secret = "change-me-generate-a-real-secret"
# Default admin password (only used on first run to create admin user)
admin_password = "changeme"
